<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>무정보 탐색 (BFS & DFS) 시뮬레이터</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js" type="text/javascript"></script>

    <style>
        @import url("https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css");

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: "Pretendard Variable", Pretendard, -apple-system, BlinkMacSystemFont, system-ui, Roboto, "Helvetica Neue", "Segoe UI", "Apple SD Gothic Neo", "Noto Sans KR", "Malgun Gothic", "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol", sans-serif;
            background-color: #f8fafc;
            color: #1e293b;
        }

        .hero-gradient {
            background: linear-gradient(
                    135deg,
                    #0f766e 0%,
                    #14b8a6 40%,
                    #06b6d4 65%,
                    #3b82f6 100%
            );
        }

        /* --- Grid Search 관련 스타일 --- */
        .tool-btn.tool-active {
            background: #6366f1;
            border-color: #4f46e5;
            color: white;
        }

        .tool-btn.tool-active:hover {
            background: #6366f1;
            border-color: #4f46e5;
        }

        #grid-container {
            display: grid;
            gap: 2px;
            background: #e2e8f0;
            border: 2px solid #cbd5e1;
            border-radius: .5rem;
            padding: 2px;
            max-width: 500px;
            margin: auto;
        }

        .grid-cell {
            aspect-ratio: 1;
            background: white;
            border-radius: .25rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: .8rem;
        }

        .grid-cell:hover {
            background-color: #f1f5f9;
        }

        .cell-wall {
            background: #475569 !important;
        }

        .cell-start {
            background: #10b981 !important;
            color: white;
            font-weight: bold;
        }

        .cell-end {
            background: #ef4444 !important;
            color: white;
            font-weight: bold;
        }

        .cell-discovered {
            background: #bae6fd !important;
        }

        .cell-visited {
            background: #3b82f6 !important;
        }

        .cell-path {
            background: #f59e0b !important;
        }

        /* --- Tree Search 관련 스타일 --- */
        .tree-network {
            width: 100%;
            height: 100%;
            aspect-ratio: 4 / 3;
            min-height: 260px;
            background-color: white;
            border: 2px solid #e2e8f0;
            border-radius: 0.75rem;
            box-shadow: inset 0 2px 4px 0 rgb(0 0 0 / 0.05);
        }

        .control-panel {
            background: white;
            border-radius: 1rem;
            padding: 1.5rem;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
        }

        .toast {
            visibility: hidden;
            opacity: 0;
            transition: all 0.3s ease-in-out;
        }

        .toast.show {
            visibility: visible;
            opacity: 1;
            transform: translate(-50%, -20px);
        }

        /* 커스텀 스크롤바 */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f5f9;
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
    </style>
</head>
<body class="antialiased pb-20">

<header class="hero-gradient text-white py-20 px-6">
    <div class="max-w-4xl mx-auto text-center">
        <span class="inline-block px-4 py-1.5 bg-white/20 rounded-full font-bold mb-5 backdrop-blur-md shadow-sm">
            인공지능 실습
        </span>
        <h1 class="text-4xl md:text-5xl lg:text-6xl font-black mb-5 leading-tight tracking-tight">
            무정보 탐색 <br class="hidden md:block">실습
        </h1>
        <p class="text-lg md:text-xl opacity-90 font-medium max-w-2xl mx-auto leading-relaxed">
            트리 구조(Tree)와 2차원 공간(Grid)에서 BFS(너비 우선 탐색)와 DFS(깊이 우선 탐색)가 어떻게 동작하는지 비교하며 학습해 보세요.
        </p>
    </div>
</header>

<div class="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-gray-200 shadow-sm">
    <div class="max-w-6xl mx-auto flex justify-center">
        <button class="px-8 py-4 font-medium text-gray-500 hover:text-indigo-600 border-b-4 border-transparent transition-colors"
                id="tab-tree"
                onclick="switchTab('tree')">
            <i class="fa-solid fa-network-wired mr-2"></i>트리 탐색 (Tree)
        </button>
        <button class="px-8 py-4 font-bold text-indigo-600 border-b-4 border-indigo-600 transition-colors" id="tab-grid"
                onclick="switchTab('grid')">
            <i class="fa-solid fa-table-cells mr-2"></i>2D 공간 탐색 (Grid)
        </button>
    </div>
</div>

<main class="max-w-6xl mx-auto mt-8 px-4">

    <section class="space-y-6 block" id="grid-search-section">
        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-5 flex flex-col lg:flex-row gap-6 justify-between items-stretch">

            <div class="flex-1 min-w-0 flex flex-col gap-3 border-b lg:border-b-0 lg:border-r border-slate-100 pb-5 lg:pb-0 lg:pr-6">
                <div class="flex items-center gap-2 text-slate-700 font-bold">
                    <i class="fa-solid fa-pen-ruler text-indigo-500"></i> 맵 편집 도구
                </div>
                <div class="grid grid-cols-2 sm:grid-cols-2 gap-2">
                    <button class="tool-btn bg-slate-50 border-2 border-slate-200 text-slate-600 rounded-xl font-bold hover:bg-slate-100 transition-all flex flex-col items-center justify-center py-2"
                            data-tool="start" id="tool-start">
                        <i class="fa-solid fa-location-dot text-emerald-500 text-lg mb-1"></i> 시작점
                    </button>
                    <button class="tool-btn bg-slate-50 border-2 border-slate-200 text-slate-600 rounded-xl font-bold hover:bg-slate-100 transition-all flex flex-col items-center justify-center py-2"
                            data-tool="end" id="tool-end">
                        <i class="fa-solid fa-flag text-rose-500 text-lg mb-1"></i> 도착점
                    </button>
                    <button class="tool-btn tool-active bg-slate-50 border-2 border-slate-200 text-slate-600 rounded-xl font-bold hover:bg-slate-100 transition-all flex flex-col items-center justify-center py-2"
                            data-tool="wall" id="tool-wall">
                        <i class="fa-solid fa-cubes text-slate-400 text-lg mb-1"></i> 벽(장애물)
                    </button>
                    <button class="tool-btn bg-slate-50 border-2 border-slate-200 text-slate-600 rounded-xl font-bold hover:bg-slate-100 transition-all flex flex-col items-center justify-center py-2"
                            data-tool="eraser" id="tool-eraser">
                        <i class="fa-solid fa-eraser text-slate-400 text-lg mb-1"></i> 지우개
                    </button>
                </div>
            </div>

            <div class="flex-1 min-w-0 flex flex-col gap-3 border-b lg:border-b-0 lg:border-r border-slate-100 pb-5 lg:pb-0 lg:pr-6">
                <div class="flex items-center gap-2 text-slate-700 font-bold">
                    <i class="fa-solid fa-sliders text-indigo-500"></i> 탐색 알고리즘 설정
                </div>
                <div class="flex flex-col gap-4 justify-center">
                    <select class="bg-indigo-50/50 border border-indigo-100 text-indigo-900 rounded-xl focus:ring-indigo-500 focus:border-indigo-500 block w-full p-3 font-bold transition-all shadow-sm outline-none cursor-pointer"
                            id="algo-select">
                        <option value="bfs">너비 우선 탐색 (BFS)</option>
                        <option value="dfs">깊이 우선 탐색 (DFS)</option>
                    </select>
                </div>
                <div class="flex items-center gap-2 text-slate-700 font-bold">
                    <i class="fa-solid fa-sliders text-indigo-500"></i> 탐색 속도
                </div>
                <div class="flex flex-col gap-4 justify-center">
                    <div class="flex items-center gap-3 bg-slate-50 p-3 rounded-xl border border-slate-100">
                        <i class="fa-solid fa-hourglass-half text-slate-400"></i>
                        <input class="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-indigo-600"
                               id="speed-slider" max="1000" min="50" type="range" value="500">
                        <i class="fa-solid fa-bolt text-slate-400"></i>
                    </div>
                </div>
            </div>

            <div class="flex-1 flex flex-col gap-3">
                <div class="flex items-center justify-between text-slate-700 font-bold">
                    <div class="flex items-center gap-2">
                        <i class="fa-solid fa-gamepad text-indigo-500"></i> 실행 제어
                    </div>
                    <span class="px-3 py-1 bg-slate-100 text-slate-600 rounded-full font-bold transition-colors"
                          id="status-text">
                        대기 중
                    </span>
                </div>
                <div class="flex gap-2 items-end">
                    <button class="flex-1 bg-indigo-50 hover:bg-indigo-100 text-indigo-700 border border-indigo-200 font-bold rounded-xl py-3 px-2 shadow-sm transition-all transform active:translate-y-0 flex flex-col items-center justify-center gap-1"
                            id="btn-step">
                        <i class="fa-solid fa-forward-step text-lg"></i>
                        <span class="">단계 진행</span>
                    </button>
                    <button class="flex-[1.5] bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-xl py-3 px-2 shadow-md transition-all transform active:translate-y-0 flex flex-col items-center justify-center gap-1"
                            id="btn-play">
                        <i class="fa-solid fa-play text-lg"></i>
                        <span class="">자동 실행</span>
                    </button>
                    <button class="w-16 bg-slate-100 hover:bg-slate-200 text-slate-600 font-bold rounded-xl py-3 shadow-sm transition-all flex flex-col items-center justify-center gap-1"
                            id="btn-reset" title="초기화">
                        <i class="fa-solid fa-arrow-rotate-right text-lg"></i>
                        <span class="">리셋</span>
                    </button>
                </div>
            </div>

        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 flex-grow">
            <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-5 flex flex-col">
                <div class="flex flex-col md:flex-row md:justify-between md:items-center mb-6 gap-2">

                    <h2 class="text-lg font-black text-slate-800 flex items-center gap-2">
        <span class="bg-indigo-100 text-indigo-600 w-8 h-8 rounded-lg flex items-center justify-center">
            <i class="fa-solid fa-chess-board"></i>
        </span>
                        2D 평면 공간
                    </h2>

                    <div class="flex flex-nowrap gap-3 font-bold text-slate-500 overflow-x-auto">
        <span class="flex items-center gap-1 whitespace-nowrap">
            <span class="w-3 h-3 rounded bg-emerald-500"></span>시작
        </span>
                        <span class="flex items-center gap-1 whitespace-nowrap">
            <span class="w-3 h-3 rounded bg-rose-500"></span>도착
        </span>
                        <span class="flex items-center gap-1 whitespace-nowrap">
            <span class="w-3 h-3 rounded bg-slate-600"></span>벽
        </span>
                        <span class="flex items-center gap-1 whitespace-nowrap">
            <span class="w-3 h-3 rounded bg-blue-500"></span>방문
        </span>
                    </div>

                </div>
                <div class="flex-grow w-full" id="grid-container">
                </div>
            </div>

            <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-5 flex flex-col">
                <div class="flex flex-col md:flex-row md:justify-between md:items-center mb-6 gap-3">

                    <h2 class="text-lg font-black text-slate-800 flex items-center gap-2">
        <span class="bg-purple-100 text-purple-600 w-8 h-8 rounded-lg flex items-center justify-center">
            <i class="fa-solid fa-network-wired"></i>
        </span>
                        탐색 트리 구조
                    </h2>

                    <div class="flex flex-wrap md:flex-nowrap gap-1 bg-slate-100 p-1 rounded-lg border border-slate-200 w-full md:w-auto">
                        <button id="btn-cam-free"
                                class="flex-1 md:flex-none px-3 py-1 text-sm font-bold rounded-md bg-white text-indigo-600 shadow-sm transition-colors text-center"
                                onclick="setGridCameraMode('free')">
                            <i class="fa-solid fa-hand mr-1"></i>자유 이동
                        </button>

                        <button id="btn-cam-track"
                                class="flex-1 md:flex-none px-3 py-1 text-sm font-bold rounded-md text-slate-500 hover:text-indigo-600 transition-colors text-center"
                                onclick="setGridCameraMode('track')">
                            <i class="fa-solid fa-crosshairs mr-1"></i>노드 추적
                        </button>

                        <button id="btn-cam-fit"
                                class="flex-1 md:flex-none px-3 py-1 text-sm font-bold rounded-md text-slate-500 hover:text-indigo-600 transition-colors text-center"
                                onclick="setGridCameraMode('fit')">
                            <i class="fa-solid fa-expand mr-1"></i>전체 맞춤
                        </button>
                    </div>

                </div>
                <div class="flex-grow border-2 border-slate-100 rounded-xl overflow-auto relative min-h-[450px]">
                    <div class="absolute inset-0 tree-network" id="tree-network-for-grid">
                    </div>
                </div>
            </div>
        </div>
    </section>

    <section class="space-y-6 hidden" id="tree-search-section">

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6 items-stretch">
            <div class="lg:col-span-1 control-panel flex flex-col gap-6 min-h-full">
                <div>
                    <div class="flex items-center gap-2 font-bold pb-2">
                        <i class="fa-solid fa-sliders text-indigo-500"></i> 환경 설정
                    </div>
                    <div class="flex gap-3 mb-3 items-end">
                        <div class="flex-1">
                            <label class="block font-bold text-gray-700 mb-1">트리 최대 깊이 (Depth)</label>
                            <input class="w-full h-9 px-3 border border-gray-300 rounded-lg focus:border-indigo-500 focus:ring-indigo-500"
                                   id="tree-max-depth" max="6" min="2" type="number" value="3">
                        </div>
                        <div class="flex-1">
                            <label class="block font-bold text-gray-700 mb-1">최대 자식 수 (Children)</label>
                            <input class="w-full h-9 px-3 border border-gray-300 rounded-lg focus:border-indigo-500 focus:ring-indigo-500"
                                   id="tree-max-children" max="4" min="1" type="number" value="2">
                        </div>
                    </div>

                    <button class="w-full bg-blue-500 hover:bg-blue-600 text-white py-3 rounded-lg font-bold transition shadow-sm flex justify-center items-center gap-2 mb-2"
                            onclick="generateRandomTree()">
                        <i class="fa-solid fa-sitemap"></i> 생성 및 초기화
                    </button>
                    <p class="text-blue-600 font-bold text-center mt-2 bg-blue-50 py-2 rounded">
                        💡 트리의 노드를 클릭하여 <br>목표(Goal)로 지정할 수 있습니다.
                    </p>
                </div>

                <div>
                    <div class="flex items-center gap-2 font-bold pb-2">
                        <i class="fa-solid fa-sliders text-indigo-500"></i> 탐색 설정
                    </div>
                    <label class="block font-medium text-gray-700 mb-1">알고리즘 선택</label>
                    <select class="w-full border-gray-300 rounded-lg shadow-sm focus:border-indigo-500 focus:ring-indigo-500 p-2 border bg-white mb-4"
                            id="tree-algo" onchange="resetTreeSearch()">
                        <option value="bfs">BFS (너비 우선 탐색)</option>
                        <option value="dfs">DFS (깊이 우선 탐색)</option>
                    </select>

                    <label class="block font-medium text-gray-700 mb-1">탐색 속도 (자동 실행 시)</label>
                    <input class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer" id="tree-speed"
                           max="1000" min="50" type="range" value="500">
                    <div class="flex justify-between text-gray-500 mt-1"><span>느림</span><span>빠름</span></div>
                </div>

                <div>
                    <div class="flex items-center gap-2 font-bold pb-2">
                        <i class="fa-solid fa-gamepad text-indigo-500"></i> 실행 제어
                    </div>
                    <div class="grid grid-cols-2 gap-2 mb-2">
                        <button class="col-span-2 bg-indigo-600 hover:bg-indigo-700 text-white py-3 rounded-lg font-bold transition shadow-md flex justify-center items-center gap-2"
                                id="btn-tree-play" onclick="toggleTreeAutoPlay()">
                            <i class="fa-solid fa-play"></i> 자동 실행
                        </button>
                        <button class="bg-teal-500 hover:bg-teal-600 text-white py-2 rounded-lg font-bold transition shadow-sm flex justify-center items-center gap-2"
                                id="btn-tree-step" onclick="stepTreeSearchManually()">
                            <i class="fa-solid fa-forward-step"></i> 다음 단계
                        </button>
                        <button class="bg-gray-500 hover:bg-gray-600 text-white py-2 rounded-lg font-bold transition shadow-sm flex justify-center items-center gap-2"
                                onclick="resetTreeSearch()">
                            <i class="fa-solid fa-rotate-right"></i> 초기화
                        </button>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-3 control-panel flex flex-col">
                <div class="mb-4 w-full flex flex-col md:flex-row md:justify-between md:items-center gap-2 font-medium text-gray-600">

                    <div class="flex flex-nowrap gap-4 overflow-x-auto">
        <span class="flex items-center gap-1 whitespace-nowrap">
            <div class="w-3 h-3 bg-[#eab308] rounded-full"></div>현재 탐색 노드
        </span>
                        <span class="flex items-center gap-1 whitespace-nowrap">
            <div class="w-3 h-3 bg-[#ef4444] rounded-full"></div>목표 노드
        </span>
                        <span class="flex items-center gap-1 whitespace-nowrap">
            <div class="w-3 h-3 bg-[#94a3b8] rounded-full"></div>탐색 완료 노드
        </span>
                    </div>

                    <div class="text-indigo-600 font-bold bg-indigo-50 px-3 py-1 rounded-full w-full md:w-auto text-center md:text-right"
                         id="tree-status">
                        대기 중
                    </div>

                </div>
                <div class="tree-network flex-grow" id="tree-network-for-tree"></div>
            </div>
        </div>
    </section>

</main>

<div class="toast fixed bottom-10 left-1/2 -translate-x-1/2 px-6 py-3 rounded-xl text-white font-bold shadow-2xl z-50 bg-gray-800"
     id="toast">
    메시지
</div>

<script>
    // --- 탭 전환 로직 ---
    function switchTab(tabName) {
        const gridSec = document.getElementById('grid-search-section');
        const treeSec = document.getElementById('tree-search-section');
        const gridTab = document.getElementById('tab-grid');
        const treeTab = document.getElementById('tab-tree');

        if (typeof isAutoPlaying !== "undefined" && isAutoPlaying) stopAutoPlay();
        if (typeof isTreePlaying !== "undefined" && isTreePlaying) stopTreeAutoPlay();

        if (tabName === 'grid') {
            gridSec.classList.remove('hidden');
            gridSec.classList.add('block');
            treeSec.classList.remove('block');
            treeSec.classList.add('hidden');

            gridTab.className = "px-8 py-4 font-bold text-indigo-600 border-b-4 border-indigo-600 transition-colors";
            treeTab.className = "px-8 py-4 font-medium text-gray-500 hover:text-indigo-600 border-b-4 border-transparent transition-colors";
        } else {
            treeSec.classList.remove('hidden');
            treeSec.classList.add('block');
            gridSec.classList.remove('block');
            gridSec.classList.add('hidden');

            treeTab.className = "px-8 py-4 font-bold text-indigo-600 border-b-4 border-indigo-600 transition-colors";
            gridTab.className = "px-8 py-4 font-medium text-gray-500 hover:text-indigo-600 border-b-4 border-transparent transition-colors";

            if (!treeNetwork) generateRandomTree();
        }
    }

    // --- 공통 유틸리티 ---
    let toastTimer = null;

    function showToast(message, type = 'info') {
        const toast = document.getElementById('toast');
        if (toastTimer) clearTimeout(toastTimer);
        toast.innerText = message;
        toast.className = `toast fixed bottom-10 left-1/2 px-6 py-3 rounded-xl text-white font-bold shadow-xl z-50 transform transition-all ${type === 'success' ? 'bg-green-600' : type === 'error' ? 'bg-red-600' : 'bg-gray-800'}`;
        toast.classList.remove('show');
        requestAnimationFrame(() => toast.classList.add('show'));
        toastTimer = setTimeout(() => toast.classList.remove('show'), 2500);
    }

    // ==========================================
    // GRID SEARCH LOGIC
    // ==========================================
    const ROWS = 10;
    const COLS = 10;
    const gridContainer = document.getElementById('grid-container');

    let grid = [];
    let gridState = [];

    let startNode = {r: 1, c: 1};
    let endNode = {r: 8, c: 8};

    let currentTool = 'wall';
    let isDrawing = false;

    let isGridPlaying = false;
    let isAutoPlaying = false;
    let searchGenerator = null;
    let playInterval = null;

    // 카메라 모드: 'free'(자유 이동), 'track'(추적), 'fit'(전체 자동 맞춤)
    let gridCameraMode = 'free';

    let nodes = new vis.DataSet();
    let edges = new vis.DataSet();
    let network = null;

    const btnPlay = document.getElementById('btn-play');
    const btnStep = document.getElementById('btn-step');
    const statusText = document.getElementById('status-text');
    const speedSlider = document.getElementById('speed-slider');

    const iconStart = '<i class="fa-solid fa-location-dot text-white text-xl drop-shadow-md"></i>';
    const iconEnd = '<i class="fa-solid fa-flag text-white text-xl drop-shadow-md"></i>';
    const iconPath = '<i class="fa-solid fa-star text-white opacity-80"></i>';

    // --- 카메라 모드 제어 함수 ---
    function setGridCameraMode(mode) {
        gridCameraMode = mode;
        const btnFree = document.getElementById('btn-cam-free');
        const btnTrack = document.getElementById('btn-cam-track');
        const btnFit = document.getElementById('btn-cam-fit');

        const activeClass = 'px-3 py-1 text-sm font-bold rounded-md bg-white text-indigo-600 shadow-sm transition-colors';
        const inactiveClass = 'px-3 py-1 text-sm font-bold rounded-md text-slate-500 hover:text-indigo-600 transition-colors';

        btnFree.className = (mode === 'free') ? activeClass : inactiveClass;
        btnTrack.className = (mode === 'track') ? activeClass : inactiveClass;
        btnFit.className = (mode === 'fit') ? activeClass : inactiveClass;

        // 버튼 클릭 즉시 모드 동작 실행
        if (mode === 'fit' && network) {
            network.fit({animation: {duration: 300, easingFunction: "easeInOutQuad"}});
        }
    }

    // --- 2. 초기화 및 이벤트 바인딩 ---
    function initGrid() {
        createGrid();
        initTreeNetwork();
        bindEvents();
        updateGridVisuals();
    }

    function createGrid() {
        gridContainer.style.gridTemplateColumns = `repeat(${COLS}, minmax(0, 1fr))`;
        gridContainer.style.gridTemplateRows = `repeat(${ROWS}, minmax(0, 1fr))`;
        gridContainer.innerHTML = '';
        grid = [];
        gridState = [];

        for (let r = 0; r < ROWS; r++) {
            let rowDom = [];
            let rowState = [];
            for (let c = 0; c < COLS; c++) {
                const cell = document.createElement('div');
                cell.className = 'grid-cell';
                cell.dataset.r = r;
                cell.dataset.c = c;
                cell.addEventListener('mousedown', handleCellMouseDown);
                cell.addEventListener('mouseenter', handleCellMouseEnter);
                gridContainer.appendChild(cell);
                rowDom.push(cell);
                rowState.push(0);
            }
            grid.push(rowDom);
            gridState.push(rowState);
        }

        document.onmouseup = () => isDrawing = false;
    }

    function initTreeNetwork() {
        const container = document.getElementById('tree-network-for-grid');
        const data = {nodes: nodes, edges: edges};
        const options = {
            layout: {hierarchical: {direction: "UD", sortMethod: "directed", nodeSpacing: 50, levelSeparation: 70}},
            physics: false,
            nodes: {
                size: 30,
                shape: "circle",
                margin: 8,
                font: {size: 18, color: '#334155'},
                borderWidth: 2,
                shadow: true
            },
            edges: {
                width: 2,
                color: {color: '#cbd5e1', highlight: '#3b82f6'},
                smooth: {type: 'cubicBezier', forceDirection: 'vertical', roundness: 0.4}
            },
            interaction: {dragNodes: true, zoomView: true, dragView: true}
        };
        network = new vis.Network(container, data, options);
    }

    function bindEvents() {
        document.querySelectorAll('.tool-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('tool-active'));
                e.currentTarget.classList.add('tool-active');
                currentTool = e.currentTarget.dataset.tool;
            });
        });
        document.getElementById('btn-reset').addEventListener('click', resetSearch);
        btnPlay.addEventListener('click', toggleGridAutoPlay);
        btnStep.addEventListener('click', stepForward);
        document.getElementById('algo-select').addEventListener('change', resetSearch);
    }

    function handleCellMouseDown(e) {
        isDrawing = true;
        applyTool(e.currentTarget);
    }

    function handleCellMouseEnter(e) {
        if (!isDrawing) return;
        if (currentTool === 'start' || currentTool === 'end') return;
        applyTool(e.currentTarget);
    }

    function clearSearchVisuals() {
        stopAutoPlay();
        isGridPlaying = false;
        searchGenerator = null;
        for (let r = 0; r < ROWS; r++) {
            for (let c = 0; c < COLS; c++) {
                grid[r][c].classList.remove('cell-discovered', 'cell-visited', 'cell-path');
                if (r !== startNode.r || c !== startNode.c) {
                    if (r !== endNode.r || c !== endNode.c) grid[r][c].innerHTML = '';
                }
            }
        }
        nodes.clear();
        edges.clear();
        setStatus("대기 중", "bg-slate-100 text-slate-600");
    }

    function applyTool(cell) {
        clearSearchVisuals();
        const r = parseInt(cell.dataset.r);
        const c = parseInt(cell.dataset.c);
        const isStart = (r === startNode.r && c === startNode.c);
        const isEnd = (r === endNode.r && c === endNode.c);

        if (currentTool === 'start') {
            if (isEnd) return;
            startNode = {r, c};
            gridState[r][c] = 0;
        } else if (currentTool === 'end') {
            if (isStart) return;
            endNode = {r, c};
            gridState[r][c] = 0;
        } else if (currentTool === 'wall') {
            if (isStart || isEnd) return;
            gridState[r][c] = 1;
        } else if (currentTool === 'eraser') {
            if (isStart || isEnd) return;
            gridState[r][c] = 0;
        }
        updateGridVisuals();
    }

    function updateGridVisuals() {
        for (let r = 0; r < ROWS; r++) {
            for (let c = 0; c < COLS; c++) {
                const cell = grid[r][c];
                cell.className = 'grid-cell';
                if (r === startNode.r && c === startNode.c) {
                    cell.classList.add('cell-start');
                    cell.innerHTML = iconStart;
                } else if (r === endNode.r && c === endNode.c) {
                    cell.classList.add('cell-end');
                    cell.innerHTML = iconEnd;
                } else if (gridState[r][c] === 1) {
                    cell.classList.add('cell-wall');
                    cell.innerHTML = '';
                } else {
                    cell.innerHTML = '';
                }
            }
        }
    }

    function* createSearchGenerator(algoType) {
        let treeIdCounter = 0;
        const queueStack = [];
        const visited = Array(ROWS).fill(0).map(() => Array(COLS).fill(false));
        const inStack = Array(ROWS).fill(0).map(() => Array(COLS).fill(false));
        const parent = Array(ROWS).fill(0).map(() => Array(COLS).fill(null));

        const isBFS = (algoType === 'bfs');
        const dr = [-1, 0, 1, 0];
        const dc = [0, 1, 0, -1];

        const startTreeId = treeIdCounter++;
        queueStack.push({r: startNode.r, c: startNode.c, treeId: startTreeId, parentCoords: null});

        if (isBFS) visited[startNode.r][startNode.c] = true;
        else inStack[startNode.r][startNode.c] = true;

        yield {
            type: 'add_node',
            node: {
                r: startNode.r,
                c: startNode.c,
                treeId: startTreeId,
                parentTreeId: null,
                label: 'S',
                color: '#10b981'
            }
        };

        let isPathFound = false;

        while (queueStack.length > 0) {
            const current = isBFS ? queueStack.shift() : queueStack.pop();

            if (!isBFS) {
                if (visited[current.r][current.c]) continue;
                visited[current.r][current.c] = true;
                if (current.parentCoords) parent[current.r][current.c] = current.parentCoords;
            }

            yield {type: 'visit', node: current};

            if (current.r === endNode.r && current.c === endNode.c) {
                isPathFound = true;
                break;
            }

            const pushOrder = isBFS ? [0, 1, 2, 3] : [3, 2, 1, 0];

            for (let i of pushOrder) {
                const nr = current.r + dr[i];
                const nc = current.c + dc[i];

                if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS) {
                    if (!visited[nr][nc] && gridState[nr][nc] !== 1) {
                        if (!isBFS && inStack[nr][nc]) continue;

                        const neighborTreeId = treeIdCounter++;
                        const neighbor = {
                            r: nr,
                            c: nc,
                            treeId: neighborTreeId,
                            parentTreeId: current.treeId,
                            parentCoords: {r: current.r, c: current.c}
                        };
                        queueStack.push(neighbor);

                        if (isBFS) {
                            visited[nr][nc] = true;
                            parent[nr][nc] = {r: current.r, c: current.c};
                        } else {
                            inStack[nr][nc] = true;
                        }

                        let labelStr = (nr === endNode.r && nc === endNode.c) ? 'E' : `${nr},${nc}`;
                        yield {type: 'add_node', node: {...neighbor, label: labelStr, color: '#bae6fd'}};
                    }
                }
            }
        }

        if (isPathFound) {
            let path = [];
            let curr = {r: endNode.r, c: endNode.c};
            while (curr !== null) {
                path.push(curr);
                const p = parent[curr.r][curr.c];
                if (p) curr = {r: p.r, c: p.c};
                else curr = null;
            }
            path.reverse();

            for (let i = 0; i < path.length; i++) {
                yield {type: 'path', node: path[i]};
            }
            return true;
        } else {
            return false;
        }
    }

    function setStatus(text, classes) {
        statusText.innerText = text;
        statusText.className = `px-3 py-1 rounded-full font-bold transition-colors ${classes}`;
    }

    function prepareSearch() {
        clearSearchVisuals();
        const algo = document.getElementById('algo-select').value;
        searchGenerator = createSearchGenerator(algo);
        isGridPlaying = true;
        setStatus("탐색 중...", "bg-indigo-100 text-indigo-700");
    }

    function processStep() {
        if (!searchGenerator) prepareSearch();
        const result = searchGenerator.next();

        if (result.done) {
            stopAutoPlay();
            isGridPlaying = false;
            if (result.value) setStatus("목표 도달! 경로 완성", "bg-emerald-100 text-emerald-700");
            else setStatus("경로 없음", "bg-rose-100 text-rose-700");

            if (network) network.fit({animation: true});
            return false;
        }

        handleAction(result.value);
        return true;
    }

    function handleAction(action) {
        const {type, node} = action;
        const cell = grid[node.r][node.c];
        const isStartEnd = (node.r === startNode.r && node.c === startNode.c) || (node.r === endNode.r && node.c === endNode.c);

        if (type === 'add_node') {
            if (!isStartEnd) cell.classList.add('cell-discovered');

            nodes.add({id: node.treeId, label: node.label, color: {background: node.color, border: '#0284c7'}});
            if (node.parentTreeId !== null) edges.add({from: node.parentTreeId, to: node.treeId});

        } else if (type === 'visit') {
            if (!isStartEnd) cell.classList.add('cell-visited');
            nodes.update({id: node.treeId, color: {background: '#3b82f6', border: '#1e40af'}, font: {color: 'white'}});

        } else if (type === 'path') {
            if (!isStartEnd) {
                cell.classList.add('cell-path');
                cell.innerHTML = iconPath;
            }
            const targetNodes = nodes.get({filter: item => item.label === `${node.r},${node.c}`});
            targetNodes.forEach(n => {
                nodes.update({id: n.id, color: {background: '#f59e0b', border: '#b45309'}, font: {color: 'white'}});
            });
        }

        // --- 카메라 모드에 따른 화면 제어 ---
        if (network) {
            if (gridCameraMode === 'track' && (type === 'add_node' || type === 'visit')) {
                network.focus(node.treeId, {
                    scale: 1.0,
                    animation: {duration: 300, easingFunction: "easeInOutQuad"}
                });
            } else if (gridCameraMode === 'fit' && type === 'add_node') {
                // 새로운 노드가 추가될 때마다 전체 화면에 맞춰 자동으로 스케일 아웃
                network.fit({
                    animation: {duration: 300, easingFunction: "easeInOutQuad"}
                });
            }
        }
    }

    function stepForward() {
        if (isAutoPlaying) stopAutoPlay();
        processStep();
    }

    function toggleGridAutoPlay() {
        if (isAutoPlaying) stopAutoPlay();
        else startAutoPlay();
    }

    function startAutoPlay() {
        if (!searchGenerator) prepareSearch();
        if (!isGridPlaying) return;

        isAutoPlaying = true;
        btnPlay.innerHTML = `<i class="fa-solid fa-pause text-lg"></i><span class="">일시 정지</span>`;
        btnPlay.classList.replace('bg-indigo-600', 'bg-rose-500');
        btnPlay.classList.replace('hover:bg-indigo-700', 'hover:bg-rose-600');

        function loop() {
            if (isAutoPlaying && isGridPlaying) {
                const hasNext = processStep();
                if (hasNext) {
                    const max = Number(speedSlider.max);
                    const min = Number(speedSlider.min);
                    const currentSpeed = max - Number(speedSlider.value) + min;
                    playInterval = setTimeout(loop, currentSpeed);
                }
            }
        }

        loop();
    }

    function stopAutoPlay() {
        isAutoPlaying = false;
        clearTimeout(playInterval);
        btnPlay.innerHTML = `<i class="fa-solid fa-play text-lg"></i><span class="">자동 실행</span>`;
        btnPlay.classList.replace('bg-rose-500', 'bg-indigo-600');
        btnPlay.classList.replace('hover:bg-rose-600', 'hover:bg-indigo-700');
    }

    function resetSearch() {
        clearSearchVisuals();
        if (network) network.fit();
    }


    // ==========================================
    // TREE SEARCH LOGIC
    // ==========================================
    let treeNetwork = null;
    let treeData = {nodes: new vis.DataSet(), edges: new vis.DataSet()};
    let treeAdjList = {};
    let treeGoalNode = null;

    let treeSearchState = null;
    let isTreePlaying = false;
    let treePlayInterval = null;

    const networkOptions = {
        layout: {hierarchical: {direction: 'UD', sortMethod: 'directed', levelSeparation: 80, nodeSpacing: 100}},
        physics: false,
        interaction: {dragNodes: false, zoomView: true, dragView: true},
        nodes: {
            size: 30,
            shape: 'circle',
            margin: 10,
            font: {size: 18, color: '#ffffff'},
            borderWidth: 2,
            color: {background: '#6366f1', border: '#4f46e5'},
            shadow: true
        },
        edges: {width: 2, color: '#cbd5e1', smooth: {type: 'cubicBezier', forceDirection: 'vertical', roundness: 0.4}}
    };

    function generateRandomTree() {
        try {
            resetTreeSearch();

            let depthInput = parseInt(document.getElementById('tree-max-depth').value) || 4;
            let childrenInput = parseInt(document.getElementById('tree-max-children').value) || 2;
            const maxDepth = Math.min(Math.max(depthInput, 2), 6);
            const maxChildren = Math.min(Math.max(childrenInput, 1), 4);

            document.getElementById('tree-max-depth').value = maxDepth;
            document.getElementById('tree-max-children').value = maxChildren;

            const MAX_NODES = 500;
            let tempNodes = [];
            let tempEdges = [];
            let tempAdj = {};
            let currentId = 1;

            tempNodes.push({id: 1, label: "1", level: 0});
            tempAdj[1] = [];

            function buildNode(parentId, depth) {
                if (depth > maxDepth) return;
                if (currentId >= MAX_NODES) return;
                const numChildren = Math.floor(Math.random() * maxChildren) + 1;

                for (let i = 0; i < numChildren; i++) {
                    if (currentId >= MAX_NODES) return;
                    currentId++;
                    const newId = currentId;
                    tempNodes.push({id: newId, label: String(newId), level: depth});
                    tempEdges.push({from: parentId, to: newId});

                    if (!tempAdj[parentId]) tempAdj[parentId] = [];
                    tempAdj[parentId].push(newId);
                    tempAdj[newId] = [];

                    buildNode(newId, depth + 1);
                }
            }

            buildNode(1, 1);

            treeData.nodes.clear();
            treeData.edges.clear();
            treeData.nodes.add(tempNodes);
            treeData.edges.add(tempEdges);
            treeAdjList = tempAdj;

            const container = document.getElementById("tree-network-for-tree");
            if (!treeNetwork) {
                treeNetwork = new vis.Network(container, treeData, networkOptions);
                treeNetwork.on("click", function (params) {
                    if (params.nodes.length > 0) setTreeGoalNode(params.nodes[0]);
                    treeNetwork.unselectAll();
                });
            } else {
                treeNetwork.setData(treeData);
            }

            setTimeout(() => {
                treeNetwork.fit({animation: true});
            }, 100);

            const allNodes = treeData.nodes.getIds();
            if (allNodes.length > 1) {
                const randomTarget = allNodes[Math.floor(Math.random() * (allNodes.length - 1)) + 1];
                setTreeGoalNode(randomTarget);
            }
        } catch (e) {
            console.error("Tree generation error:", e);
            treeData.nodes.clear();
            treeData.edges.clear();
            treeAdjList = {};
            if (treeNetwork) treeNetwork.setData({nodes: [], edges: []});
        }
    }

    function setTreeGoalNode(nodeId) {
        if (treeSearchState && treeSearchState.status !== 'finished') {
            showToast("탐색이 진행 중일 때는 목표를 변경할 수 없습니다.", "error");
            return;
        }
        if (!treeData.nodes.get(nodeId)) return;

        if (treeGoalNode !== null) {
            const oldNode = treeData.nodes.get(treeGoalNode);
            if (oldNode) treeData.nodes.update({id: treeGoalNode, color: {background: '#6366f1', border: '#4f46e5'}});
        }

        treeGoalNode = nodeId;
        treeData.nodes.update({id: nodeId, color: {background: '#ef4444', border: '#b91c1c'}});
        showToast(`노드 [${nodeId}]번이 목표로 지정되었습니다.`, "success");
    }

    function initTreeSearch() {
        const algo = document.getElementById('tree-algo').value;
        treeSearchState = {
            algo: algo,
            dataStructure: [1],
            visited: new Set([1]),
            status: 'running',
            currentNode: null
        };
        document.getElementById('tree-status').innerText = `${algo.toUpperCase()} 탐색 중...`;

        const nodesToUpdate = treeData.nodes.get().map(n => {
            if (n.id === treeGoalNode) return {id: n.id, color: {background: '#ef4444', border: '#b91c1c'}};
            return {id: n.id, color: {background: '#6366f1', border: '#4f46e5'}};
        });
        treeData.nodes.update(nodesToUpdate);
    }

    function stepTreeCore() {
        if (!treeSearchState) initTreeSearch();
        if (treeSearchState.status !== 'running') return false;

        const st = treeSearchState;

        if (st.currentNode !== null && st.currentNode !== treeGoalNode) {
            treeData.nodes.update({id: st.currentNode, color: {background: '#94a3b8', border: '#64748b'}});
        }

        if (st.dataStructure.length === 0) {
            st.status = 'finished';
            document.getElementById('tree-status').innerText = '목표 노드를 찾지 못했습니다.';
            showToast('탐색 가능한 모든 노드를 확인했습니다.', 'error');
            return false;
        }

        const current = st.algo === 'bfs' ? st.dataStructure.shift() : st.dataStructure.pop();
        st.currentNode = current;

        if (current === treeGoalNode) {
            st.status = 'finished';
            document.getElementById('tree-status').innerText = '목표 탐색 완료!';
            treeData.nodes.update({id: current, color: {background: '#22c55e', border: '#16a34a'}});
            showToast(`목표 노드 [${current}]번을 성공적으로 찾았습니다!`, 'success');
            return false;
        }

        treeData.nodes.update({id: current, color: {background: '#eab308', border: '#ca8a04'}});

        const children = treeAdjList[current] || [];
        const insertOrder = st.algo === 'dfs' ? [...children].reverse() : children;

        for (let child of insertOrder) {
            if (!st.visited.has(child)) {
                st.visited.add(child);
                st.dataStructure.push(child);
            }
        }
        return true;
    }

    function stepTreeSearchManually() {
        if (isTreePlaying) stopTreeAutoPlay();
        if (treeSearchState && treeSearchState.status === 'finished') {
            showToast('탐색이 이미 완료되었습니다. 초기화 후 다시 실행하세요.');
            return;
        }
        stepTreeCore();
    }

    function stopTreeAutoPlay() {
        isTreePlaying = false;
        clearTimeout(treePlayInterval);
        const btn = document.getElementById('btn-tree-play');
        btn.innerHTML = `<i class="fa-solid fa-play"></i> 자동 실행`;
        btn.classList.replace('bg-rose-500', 'bg-indigo-600');
        btn.classList.replace('hover:bg-rose-600', 'hover:bg-indigo-700');
    }

    function toggleTreeAutoPlay() {
        if (isTreePlaying) stopTreeAutoPlay();
        else startTreeAutoPlay();
    }

    function startTreeAutoPlay() {
        if (treeSearchState && treeSearchState.status === 'finished') resetTreeSearch();
        isTreePlaying = true;
        const btn = document.getElementById('btn-tree-play');
        btn.innerHTML = `<i class="fa-solid fa-pause"></i> 일시 정지`;
        btn.classList.replace('bg-indigo-600', 'bg-rose-500');
        btn.classList.replace('hover:bg-indigo-700', 'hover:bg-rose-600');

        function loop() {
            if (isTreePlaying) {
                const hasNext = stepTreeCore();
                if (hasNext) {
                    const speed = document.getElementById('tree-speed').max - document.getElementById('tree-speed').value + 100;
                    treePlayInterval = setTimeout(loop, speed);
                } else {
                    stopTreeAutoPlay();
                }
            }
        }

        loop();
    }

    function resetTreeSearch() {
        if (isTreePlaying) stopTreeAutoPlay();
        treeSearchState = null;
        document.getElementById('tree-status').innerText = '대기 중';
        const nodesToUpdate = treeData.nodes.get().map(n => {
            if (n.id === treeGoalNode) return {id: n.id, color: {background: '#ef4444', border: '#b91c1c'}};
            return {id: n.id, color: {background: '#6366f1', border: '#4f46e5'}};
        });
        treeData.nodes.update(nodesToUpdate);
    }

    // --- 초기화 ---
    window.onload = () => {
        initGrid();
    };

</script>
