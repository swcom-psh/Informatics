<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>프로그래밍의 절차 강의노트</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800&display=swap');

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Pretendard', sans-serif;
        }

        .step-card {
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .progress-dot {
            transition: all 0.3s ease;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 leading-relaxed overflow-x-hidden">

<!-- Header (Consistent) -->
<header class="bg-white/80 backdrop-blur-md border-b border-slate-200 sticky top-0 z-50">
    <div class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
        <div class="flex items-center gap-3">
            <div class="bg-indigo-600 p-2 rounded-lg text-white">
                <i class="w-6 h-6" data-lucide="git-branch"></i>
            </div>
            <div>
                <p class="text-[10px] font-bold text-indigo-600 uppercase tracking-widest leading-none mb-1">Chapter
                    1-2</p>
                <h1 class="text-xl font-extrabold text-slate-800">프로그래밍의 절차</h1>
            </div>
        </div>
        <div class="bg-slate-100 px-4 py-1.5 rounded-full flex gap-3">
            <span class="font-black text-indigo-600" id="step-counter">STEP 01/05</span>
        </div>
    </div>
</header>

<main class="max-w-6xl mx-auto px-6 py-12">
    <!-- Progress Stepper -->
    <div class="flex justify-between items-center mb-16 relative px-4">
        <div class="absolute top-1/2 left-0 w-full h-0.5 bg-slate-200 -translate-y-1/2 z-0"></div>
        <div class="absolute top-1/2 left-0 h-0.5 bg-indigo-600 -translate-y-1/2 z-0 transition-all duration-500"
             id="progress-line"
             style="width: 0%"></div>

        <!-- Dots Generated by JS -->
        <div class="relative z-10 w-full flex justify-between" id="stepper-dots"></div>
    </div>

    <!-- Content Card -->
    <div class="bg-white rounded-[2.5rem] shadow-xl shadow-slate-200/50 border border-slate-100 overflow-hidden step-card"
         id="step-card">
        <div class="p-8 md:p-12">
            <div class="flex items-center gap-4 mb-8">
                <div class="w-16 h-16 bg-indigo-50 text-indigo-600 rounded-3xl flex items-center justify-center"
                     id="step-icon">
                    <i class="w-8 h-8" data-lucide="search"></i>
                </div>
                <div>
                    <h2 class="text-3xl font-black text-slate-900" id="step-title">요구사항 분석</h2>
                    <p class="text-slate-400 font-bold uppercase tracking-tighter ">Step Phase</p>
                </div>
            </div>

            <div class="space-y-8">
                <div class="bg-slate-50 p-6 rounded-2xl border border-slate-100">
                    <h3 class="font-black text-indigo-600 uppercase mb-3 flex items-center gap-2">
                        <i class="w-3 h-3" data-lucide="info"></i> What we do
                    </h3>
                    <p class="text-lg text-slate-700 font-medium leading-relaxed" id="step-content"></p>
                </div>

                <div class="grid md:grid-cols-2 gap-6">
                    <div class="space-y-3">
                        <h4 class="font-bold text-slate-500 px-1">핵심 체크포인트</h4>
                        <div class="space-y-2" id="key-points"></div>
                    </div>
                    <div class="bg-indigo-600 p-6 rounded-3xl text-white relative overflow-hidden">
                        <div class="relative z-10">
                            <h4 class="font-black uppercase opacity-70 mb-2">Practical Tip</h4>
                            <p class="font-medium leading-relaxed" id="learning-tip"></p>
                        </div>
                        <i class="absolute -right-4 -bottom-4 w-24 h-24 opacity-20" data-lucide="lightbulb"></i>
                    </div>
                </div>
            </div>
        </div>

        <!-- Card Footer Controls -->
        <div class="bg-slate-50 p-6 md:px-12 flex justify-between items-center border-t border-slate-100">
            <button class="flex items-center gap-2 font-bold text-slate-400 hover:text-indigo-600 transition-all disabled:opacity-0"
                    id="prev-btn"
                    onclick="prevStep()">
                <i class="w-4 h-4" data-lucide="arrow-left"></i> PREVIOUS
            </button>
            <button class="px-8 py-3 bg-slate-900 text-white rounded-xl font-black uppercase tracking-widest hover:bg-indigo-600 transition-all flex items-center gap-2"
                    id="next-btn"
                    onclick="nextStep()">
                NEXT <i class="w-4 h-4" data-lucide="arrow-right"></i>
            </button>
        </div>
    </div>
</main>

<script>
    const steps = [
        {
            title: "요구사항 분석",
            icon: "search",
            content: "해결해야 할 문제가 무엇인지 명확하게 정의하고, 필요한 데이터와 제약 사항을 파악합니다.",
            keyPoints: ["입력 데이터 정의", "출력 결과 정의", "처리 조건 확인", "요구사항 수집 → 요구사항 분류 및 조직화 → 요구사항 기술 → 요구사항 검증"],
            tip: "문제를 작은 단위로 쪼개서 생각하면 분석이 훨씬 쉬워집니다."
        },
        {
            title: "알고리즘 설계",
            icon: "pencil-ruler",
            content: "문제를 해결하기 위한 논리적인 절차를 순서도(Flowchart)나 의사 코드로 작성합니다.",
            keyPoints: ["논리적 흐름 구성", "효율성 검토", "예외 상황 고려"],
            tip: "코딩을 시작하기 전, 종이에 먼저 흐름을 그려보는 습관을 들이세요."
        },
        {
            title: "코드 작성 (구현)",
            icon: "terminal",
            content: "설계된 알고리즘을 특정 프로그래밍 언어의 문법에 맞춰 실제 코드로 구현합니다.",
            keyPoints: ["언어 문법 준수", "가독성 있는 코드", "주석 작성"],
            tip: "이름만 봐도 용도를 알 수 있는 변수명을 사용하는 것이 좋습니다."
        },
        {
            title: "테스트 및 디버깅",
            icon: "bug",
            content: "프로그램을 실행하여 오류(Bug)를 찾아내고 수정하며, 정상 작동 여부를 확인합니다.",
            keyPoints: ["에러 메시지 확인", "테스트 데이터 입력", "논리 오류 수정"],
            tip: "디버깅은 '범인 찾기'가 아니라 '원인 파악'입니다. 디버깅을 즐기세요! (왜 돌아가는지 몰라도 일단 돌아간다면 그건 정상 코드일겁니다 :D)"
        },
        {
            title: "유지보수",
            icon: "settings",
            content: "완성된 프로그램의 성능을 개선하거나 새로운 기능을 추가하며 지속적으로 관리합니다.",
            keyPoints: ["성능 최적화", "사용자 피드백 반영", "코드 문서화"],
            tip: "좋은 프로그램은 완성된 후에도 계속해서 진화합니다."
        }
    ];

    let currentStep = 0;

    function render() {
        const step = steps[currentStep];

        // Text Updates
        document.getElementById('step-title').innerText = step.title;
        document.getElementById('step-content').innerText = step.content;
        document.getElementById('step-counter').innerText = `STEP 0${currentStep + 1}/05`;
        document.getElementById('learning-tip').innerText = step.tip;

        // Icon Update
        const iconBox = document.getElementById('step-icon');
        iconBox.innerHTML = `<i data-lucide="${step.icon}" class="w-8 h-8"></i>`;

        // Key Points
        const kpBox = document.getElementById('key-points');
        kpBox.innerHTML = step.keyPoints.map(p => `
                <div class="flex items-center gap-3 p-3 bg-white border border-slate-100 rounded-xl font-bold text-slate-600 shadow-sm">
                    <div class="w-1.5 h-1.5 rounded-full bg-indigo-400"></div>
                    ${p}
                </div>
            `).join('');

        // Progress Controls
        const progress = (currentStep / (steps.length - 1)) * 100;
        document.getElementById('progress-line').style.width = `${progress}%`;

        document.getElementById('prev-btn').disabled = currentStep === 0;
        document.getElementById('next-btn').innerHTML = currentStep === steps.length - 1 ? 'FINISH' : 'NEXT <i data-lucide="arrow-right" class="w-4 h-4"></i>';

        // Stepper Dots
        const dotsBox = document.getElementById('stepper-dots');
        dotsBox.innerHTML = steps.map((_, i) => `
                <button onclick="setStep(${i})" class="w-10 h-10 rounded-full border-4 border-slate-50 flex items-center justify-center font-black transition-all ${i <= currentStep ? 'bg-indigo-600 text-white' : 'bg-slate-200 text-slate-400'}">
                    ${i + 1}
                </button>
            `).join('');

        lucide.createIcons();
    }

    function setStep(i) {
        currentStep = i;
        render();
    }

    function nextStep() {
        if (currentStep < steps.length - 1) {
            currentStep++;
            render();
        }
    }

    function prevStep() {
        if (currentStep > 0) {
            currentStep--;
            render();
        }
    }

    render();
</script>
</body>
</html>
